# Reconciliação completa (inclui listInstances na Vultr) — menos frequente que o cron quente.
# Reduz chamadas pesadas à API Vultr sem atrasar teardown/provisionamento.

name: CloudPC reconciliation

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: GET /api/cron/reconciliation
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${APP_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::Defina APP_URL e CRON_SECRET (Actions secrets)."
            exit 1
          fi
          URL="${APP_URL%/}/api/cron/reconciliation"
          echo "Calling $URL"
          HTTP_CODE=$(curl -sS -o body.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "$URL")
          cat body.json
          echo
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::HTTP $HTTP_CODE (esperado 200)"
            exit 1
          fi
